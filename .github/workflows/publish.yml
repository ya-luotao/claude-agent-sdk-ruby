name: Publish gem

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  rubygems:
    name: Push to rubygems.org
    runs-on: ubuntu-latest
    environment:
      name: rubygems
      url: https://rubygems.org/gems/claude-agent-sdk
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Release gem via trusted publisher
        uses: rubygems/release-gem@v1

  github-packages:
    name: Push to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build gem
        run: gem build claude-agent-sdk.gemspec

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.gem
          printf -- '---\n:github: Bearer %s\n' "$GITHUB_TOKEN" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem push --key github --host https://rubygems.pkg.github.com/ya-luotao *.gem
