name: Publish gem

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  rubygems:
    name: Push to rubygems.org
    runs-on: ubuntu-latest
    environment:
      name: rubygems
      url: https://rubygems.org/gems/claude-agent-sdk
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Release gem via trusted publisher
        uses: rubygems/release-gem@v1
