inherit_from: .rubocop_todo.yml

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'examples/**/*'

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Layout/IndentationConsistency:
  Enabled: true
  EnforcedStyle: indented_internal_methods

Layout/EmptyLinesAroundAccessModifier:
  Enabled: true
  EnforcedStyle: only_before

Layout/LineLength:
  Enabled: false

Layout/TrailingEmptyLines:
  Enabled: true

Layout/TrailingWhitespace:
  Enabled: true

Metrics/MethodLength:
  Max: 30
  Exclude:
    - 'lib/claude_agent_sdk.rb'
    - 'lib/claude_agent_sdk/query.rb'
    - 'lib/claude_agent_sdk/message_parser.rb'
    - 'lib/claude_agent_sdk/sdk_mcp_server.rb'
    - 'lib/claude_agent_sdk/subprocess_cli_transport.rb'
    - 'lib/claude_agent_sdk/types.rb'
    - 'lib/claude_agent_sdk/instrumentation/otel.rb'

Metrics/ClassLength:
  Max: 250
  Exclude:
    - 'lib/claude_agent_sdk/query.rb'
    - 'lib/claude_agent_sdk/message_parser.rb'
    - 'lib/claude_agent_sdk/subprocess_cli_transport.rb'

Metrics/ModuleLength:
  Exclude:
    - 'lib/claude_agent_sdk.rb'
    - 'lib/claude_agent_sdk/types.rb'

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'
